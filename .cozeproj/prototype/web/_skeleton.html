<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/inter.css" rel="stylesheet"/>
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/manrope.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #7C5CFF;
      --color-primary-container:    #9B82FF;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #070A14;
      --color-surface-container-lowest:   #0B0F1A;
      --color-surface:                    #0F1420;
      --color-surface-container:          #161B2E;
      --color-surface-container-high:     #1C2338;
      --color-surface-container-highest:  #232B45;
      /* === 文字 === */
      --color-on-surface:           #F7FAFF;
      --color-on-surface-variant:   #9AA7C7;
      /* === 功能色 === */
      --color-success:  #62FAD3;
      --color-error:    #FF5C5C;
      --color-warning:  #FFB547;
      /* === 强调色 === */
      --color-accent:   #69E7FF;
      /* === 边框 === */
      --color-outline:          rgba(255,255,255,0.12);
      --color-outline-variant:  rgba(255,255,255,0.06);
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.4);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.5);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.6);
      /* === 字体 === */
      --font-sans: "Inter", "Manrope", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段 -->
  <header class="bg-surface/80 backdrop-blur-xl border-b border-outline/20 sticky top-0 z-40 h-14 flex items-center justify-between px-5">
    <div class="flex items-center gap-3">
      <i data-lucide="cloud" class="text-primary w-5 h-5"></i>
      <span class="font-bold text-base tracking-tight">CloudOps</span>
    </div>
    <div class="flex items-center gap-4">
      <button class="relative text-on-surface-variant hover:text-on-surface transition-colors" id="btn-notification">
        <i data-lucide="bell" class="w-4.5 h-4.5"></i>
        <span class="absolute -top-1 -right-1 w-2 h-2 bg-error rounded-full"></span>
      </button>
      <div class="flex items-center gap-2 cursor-pointer">
        <div class="w-7 h-7 rounded-full bg-primary/20 flex items-center justify-center text-primary text-xs font-bold">初</div>
        <span class="text-sm text-on-surface-variant">小初</span>
      </div>
    </div>
  </header>

  <div class="flex" style="height: calc(100vh - 3.5rem)">
    <aside class="w-56 shrink-0 bg-surface-container-lowest/60 backdrop-blur-md border-r border-outline/20 overflow-y-auto">
      <div class="p-3 space-y-0.5">
        <a href="dashboard.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-all" data-page="dashboard">
          <i data-lucide="gauge" class="w-4 h-4"></i>仪表盘
        </a>
        <a href="cloud-drive.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-all" data-page="cloud-drive">
          <i data-lucide="hard-drive" class="w-4 h-4"></i>云盘
        </a>
        <a href="servers.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-all" data-page="servers">
          <i data-lucide="server" class="w-4 h-4"></i>服务器管理
        </a>
        <a href="storage-nodes.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-all" data-page="storage-nodes">
          <i data-lucide="database" class="w-4 h-4"></i>存储节点
        </a>
        <a href="users.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-all" data-page="users">
          <i data-lucide="users" class="w-4 h-4"></i>用户管理
        </a>
        <a href="settings.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-on-surface font-medium text-sm transition-all" data-page="settings">
          <i data-lucide="settings" class="w-4 h-4"></i>系统设置
        </a>
      </div>
    </aside>

    <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

    <!-- @main-content:start -->
    <main class="flex-1 min-w-0 overflow-y-auto bg-background p-6">
      <!-- 页面内容由子 Agent 填充 -->
    </main>
    <!-- @main-content:end -->
  </div>

  <script>lucide.createIcons();</script>
</body>

</html>
